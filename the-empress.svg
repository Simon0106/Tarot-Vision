<svg width="300" height="500" viewBox="0 0 300 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cardGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0f2e;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#2d1b4e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a0f2e;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="300" height="500" fill="url(#cardGradient)" rx="15"/>
  
  <!-- Border -->
  <rect x="10" y="10" width="280" height="480" fill="none" stroke="#d4af37" stroke-width="2" rx="12" opacity="0.6"/>
  <rect x="15" y="15" width="270" height="470" fill="none" stroke="#d4af37" stroke-width="1" rx="10" opacity="0.3"/>
  
  <!-- Decorative corners -->
  <circle cx="30" cy="30" r="3" fill="#d4af37" opacity="0.5"/>
  <circle cx="270" cy="30" r="3" fill="#d4af37" opacity="0.5"/>
  <circle cx="30" cy="470" r="3" fill="#d4af37" opacity="0.5"/>
  <circle cx="270" cy="470" r="3" fill="#d4af37" opacity="0.5"/>
  
  <!-- Top symbol -->
  <text x="150" y="80" font-family="Arial, sans-serif" font-size="40" fill="#d4af37" text-anchor="middle" opacity="0.4">✨</text>
  
  <!-- Card name -->
  <text x="150" y="240" font-family="'Cinzel', serif" font-size="24" fill="#d4af37" text-anchor="middle" font-weight="500" filter="url(#glow)">The Empress</text>
  
  <!-- Bottom symbol -->
  <text x="150" y="440" font-family="Arial, sans-serif" font-size="40" fill="#d4af37" text-anchor="middle" opacity="0.4">✨</text>
  
  <!-- Mystical dots pattern -->
  <circle cx="150" cy="150" r="1.5" fill="#d4af37" opacity="0.3"/>
  <circle cx="140" cy="160" r="1" fill="#d4af37" opacity="0.3"/>
  <circle cx="160" cy="160" r="1" fill="#d4af37" opacity="0.3"/>
  <circle cx="150" cy="350" r="1.5" fill="#d4af37" opacity="0.3"/>
  <circle cx="140" cy="340" r="1" fill="#d4af37" opacity="0.3"/>
  <circle cx="160" cy="340" r="1" fill="#d4af37" opacity="0.3"/>
</svg>